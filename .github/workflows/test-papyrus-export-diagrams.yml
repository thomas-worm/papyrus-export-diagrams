name: "Test: papyrus-export-diagrams"

on:
  push: {}
  pull_request: {}

permissions:
  contents: write

jobs:
  testExportDiagrams:
    runs-on: ubuntu-latest
    name: "Test papyrus-export-diagrams action"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Papyrus
        id: papyrus
        uses: thomas-worm/setup-papyrus@v1

      - name: Run export action
        id: export
        uses: ./
        with:
          papyrus-home: ${{ steps.papyrus.outputs.papyrus-home }}
          model-dir:    model
          output-dir:   model_images

      - name: Show exported images
        run: |
          echo "Exported diagrams: ${{ steps.export.outputs.exported-count }}"
          echo "Failed exports:    ${{ steps.export.outputs.failed-count }}"
          ls -lR model_images || true

      - name: Upload export log on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: papyrus-export-log
          path: ${{ runner.temp }}/papyrus-export.log
          if-no-files-found: warn

      - name: Commit and push changes
        if: ${{ github.event_name == 'push' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_images
          git diff --staged --quiet || \
            (git commit -m "chore: re-export diagrams [skip ci]" && \
             git push origin HEAD:${GITHUB_REF#refs/heads/})
