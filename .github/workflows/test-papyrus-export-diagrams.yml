name: "Test: papyrus-export-diagrams"
description: "Test the papyrus-export-diagrams action by running it on a sample Papyrus model and checking the output images."

on:
  push: {}
  pull_request: {}

permissions:
  contents: write

jobs:
  testExportDiagrams:
    runs-on: ubuntu-latest
    name: "Test papyrus-export-diagrams action"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Papyrus
        id: papyrus
        uses: thomas-worm/setup-papyrus@v1

      - name: Run export action
        id: export
        uses: ./
        with:
          papyrus-home: ${{ steps.papyrus.outputs.papyrus-home }}
          model-dir:    model
          output-dir:   model_images

      - name: Check exported images
        run: |
          echo "Exported diagrams: ${{ steps.export.outputs.exported-count }}"
          echo "Failed exports: ${{ steps.export.outputs.failed-count }}"
          ls -l ${{ runner.temp }}/exported-diagrams

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_images
          git diff --staged --quiet || \
            (git commit -m "chore: re-export diagrams [skip ci]" && \
             git push origin HEAD:${GITHUB_REF#refs/heads/})
