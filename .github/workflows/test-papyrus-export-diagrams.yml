name: "Test: papyrus-export-diagrams"

on:
  push: {}
  pull_request: {}

permissions:
  contents: write

jobs:
  testExportDiagrams:
    runs-on: ubuntu-latest
    name: "Test papyrus-export-diagrams action"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install fonts for diagram rendering
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            fonts-liberation fonts-dejavu fonts-noto fontconfig
          sudo fc-cache -f

      - name: Set up Papyrus
        id: papyrus
        uses: thomas-worm/setup-papyrus@v1

      - name: Clean previous output
        # The test workflow commits model_images back to the repo, so each
        # run sees the previous run's files. Wipe them so we don't leave
        # orphaned files behind when filenames or formats change.
        run: rm -rf model_images && mkdir -p model_images

      - name: Run export action
        id: export
        uses: ./
        with:
          papyrus-home: ${{ steps.papyrus.outputs.papyrus-home }}
          model-dir:    model
          output-dir:   model_images

      - name: Show exported images
        run: |
          echo "Exported diagrams: ${{ steps.export.outputs.exported-count }}"
          echo "Failed exports:    ${{ steps.export.outputs.failed-count }}"
          ls -lR model_images || true

      - name: Upload export log on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: papyrus-export-log
          path: ${{ runner.temp }}/papyrus-export.log
          if-no-files-found: warn

      - name: Commit and push changes
        # Run on partial export failures too — if anything was rendered,
        # the user wants those files saved rather than discarded.
        if: ${{ always() && github.event_name == 'push' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_images
          git diff --staged --quiet || \
            (git commit -m "chore: re-export diagrams [skip ci]" && \
             git push origin HEAD:${GITHUB_REF#refs/heads/})
